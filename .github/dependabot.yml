version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      android-build-dependencies:
        patterns:
          - "*"
    ignore:
      # CodeQL 2.25.6 (KotlinInterceptor) rejects Kotlin ≥ 2.3.30 with
      # KotlinVersionTooRecentError. Keep this pin until CodeQL ships support
      # for the version Dependabot wants to install.
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.3.30"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
