name: Dependabot

on:
  workflow_dispatch:
    inputs:
      ecosystem:
        description: Package ecosystem to update
        required: false
        default: all
        type: choice
        options:
          - all
          - gradle
          - github-actions

permissions:
  contents: read

jobs:
  trigger:
    name: Trigger updates
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gradle
        if: inputs.ecosystem == 'all' || inputs.ecosystem == 'gradle'
        run: |
          gh api --method POST /repos/${{ github.repository }}/dependabot/updates \
            -f package-manager-name=gradle \
            -f directory=/ \
            -f target-branch=main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger GitHub Actions
        if: inputs.ecosystem == 'all' || inputs.ecosystem == 'github-actions'
        run: |
          gh api --method POST /repos/${{ github.repository }}/dependabot/updates \
            -f package-manager-name=github-actions \
            -f directory=/ \
            -f target-branch=main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
