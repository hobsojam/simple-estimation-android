name: OWASP Dependency Check

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-check:
    name: Scan Gradle dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;36.0.0"

      - name: Restore vulnerability database
        uses: actions/cache/restore@v4
        with:
          path: build/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Require NVD API key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::Configure the NVD_API_KEY repository secret before running this workflow."
            exit 1
          fi

      - name: Scan dependencies
        run: ./gradlew dependencyCheckAnalyze
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Save vulnerability database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ github.run_id }}

      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: app/build/reports/dependency-check-report.*
          if-no-files-found: warn
